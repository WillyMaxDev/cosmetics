name: Compilar y Crear Release

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
    
    - name: Compilar con Maven
      run: mvn clean package
    
    - name: Obtener versión
      id: version
      run: echo "VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_OUTPUT
    
    - name: Obtener commit
      id: commit
      run: echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
    
    - name: Crear Release
      uses: softprops/action-gh-release@v1
      with:
        files: target/NetsuCosmetics.jar
        tag_name: v${{ steps.version.outputs.VERSION }}-${{ steps.commit.outputs.SHORT_SHA }}
        body: |
          Compilación automática de NetsuCosmetics
          Commit: ${{ steps.commit.outputs.SHORT_SHA }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
